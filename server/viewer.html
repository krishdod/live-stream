<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Workspace</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  color: #e8eaed;
  font-family: "Google Sans", "Segoe UI", system-ui, sans-serif;
  min-height: 100vh;
}

#locked {
  max-width: 420px;
  margin: 100px auto;
  text-align: center;
  padding: 24px;
}

#locked h2 { font-size: 22px; margin-bottom: 8px; font-weight: 400; }
#locked p { color: #888; font-size: 14px; line-height: 1.6; }

.container { max-width: 900px; margin: 0 auto; padding: 12px; }

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
  gap: 10px;
}

.logo { font-size: 16px; font-weight: 700; flex-shrink: 0; }
.toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

#shareBtn, #autoCopyBtn {
  padding: 6px 14px;
  border: none;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  background: #1a1a1a;
  color: #ccc;
  white-space: nowrap;
  flex-shrink: 0;
}

#shareBtn { background: #1e3a5f; color: #93c5fd; }
#autoCopyBtn.on { background: #052e16; color: #4ade80; }

#roleBadge {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 999px;
  background: #2a2a2a;
  color: #aaa;
  white-space: nowrap;
  flex-shrink: 0;
}

.status {
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
  flex-shrink: 0;
}

.connected { background: #052e16; color: #4ade80; }
.disconnected { background: #3a1a1a; color: #f87171; }

.workspace {
  background: #0d0d0d;
  border: 1px solid #1a1a1a;
  border-radius: 8px;
  min-height: calc(100vh - 100px);
  padding: 32px 40px;
}

#answer {
  outline: none;
  white-space: pre-wrap;
  word-wrap: break-word;
  line-height: 1.75;
  font-size: 15px;
  color: #e8eaed;
  min-height: 200px;
  caret-color: #4ade80;
}

#answer.view-only { caret-color: transparent; }

#answer:empty::before {
  content: "Start typing or turn on Auto Copy to receive live text...";
  color: #555;
  pointer-events: none;
}

#answer.view-only:empty::before { content: "Waiting for live content..."; }

#remoteSelBar {
  font-size: 12px;
  color: #60a5fa;
  background: #0d1f33;
  border: 1px solid #1e3a5f;
  border-radius: 8px;
  padding: 8px 12px;
  margin-bottom: 10px;
  display: none;
}

#remoteSelBar.visible { display: block; }

::highlight(remote-selection) {
  background-color: rgba(66, 133, 244, 0.35);
}

.footer { margin-top: 12px; font-size: 12px; color: #666; }
.hidden { display: none !important; }

/* Share modal — Google Docs style */
#shareOverlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

.share-modal {
  background: #fff;
  color: #1f1f1f;
  border-radius: 28px;
  width: 100%;
  max-width: 512px;
  padding: 24px;
  box-shadow: 0 8px 40px rgba(0,0,0,.4);
}

.share-modal h2 {
  font-size: 22px;
  font-weight: 400;
  margin-bottom: 16px;
}

.share-email-row {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}

#shareEmail {
  flex: 1;
  padding: 12px 14px;
  border: 1px solid #dadce0;
  border-radius: 24px;
  font-size: 14px;
  outline: none;
}

#shareEmail:focus {
  border-color: #1a73e8;
}

#sendEmailBtn {
  padding: 10px 18px;
  border: none;
  border-radius: 999px;
  background: #1a73e8;
  color: #fff;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}

#sendEmailBtn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.share-section-title {
  font-size: 14px;
  font-weight: 500;
  color: #444;
  margin-bottom: 12px;
}

.share-general {
  background: #f8f9fa;
  border-radius: 12px;
  padding: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}

.share-globe {
  width: 40px;
  height: 40px;
  background: #e8f0fe;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.share-general-text { flex: 1; min-width: 0; }

.share-general-text select {
  font-size: 14px;
  font-weight: 500;
  border: none;
  background: transparent;
  color: #1f1f1f;
  cursor: pointer;
  width: 100%;
}

.share-general-text p {
  font-size: 12px;
  color: #666;
  margin-top: 2px;
}

.share-role-select {
  border: 1px solid #dadce0;
  border-radius: 8px;
  padding: 8px 10px;
  font-size: 13px;
  background: #fff;
  cursor: pointer;
}

.share-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 8px;
}

#copyLinkBtn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  border: 1px solid #dadce0;
  border-radius: 999px;
  background: #fff;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  color: #1a73e8;
}

#copyLinkBtn:hover { background: #f8f9fa; }

#shareDoneBtn {
  padding: 10px 24px;
  border: none;
  border-radius: 999px;
  background: #1a73e8;
  color: #fff;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
}

#copyToast {
  font-size: 12px;
  color: #137333;
  margin-top: 8px;
  min-height: 18px;
}

@media (max-width: 768px) {
  .workspace { padding: 20px 16px; }
  #answer { font-size: 14px; }
}
</style>
</head>
<body>

<div id="locked" class="hidden">
  <h2>You need access</h2>
  <p>Ask the owner to share the Live Workspace link with you.</p>
</div>

<div id="app" class="hidden">
  <div class="container">
    <div class="header">
      <div class="logo">Live Workspace</div>
      <div class="toolbar">
        <span id="roleBadge">Editor</span>
        <button id="shareBtn" class="hidden">Share</button>
        <button id="autoCopyBtn">Auto Copy: OFF</button>
        <div id="status" class="status disconnected">Connecting...</div>
      </div>
    </div>
    <div class="workspace">
      <div id="remoteSelBar"></div>
      <div id="answer" contenteditable="true" spellcheck="true"></div>
    </div>
    <div class="footer">Last Updated: <span id="updatedAt">--</span></div>
  </div>
</div>

<div id="shareOverlay" class="hidden">
  <div class="share-modal">
    <h2>Share "Live Workspace"</h2>
    <div class="share-email-row">
      <input id="shareEmail" type="email" placeholder="Add people by email">
      <button id="sendEmailBtn">Send</button>
    </div>
    <div class="share-section-title">General access</div>
    <div class="share-general">
      <div class="share-globe">🌐</div>
      <div class="share-general-text">
        <select id="accessType">
          <option value="link">Anyone with the link</option>
        </select>
        <p id="accessDesc">Anyone on the internet with the link can view</p>
      </div>
      <select id="linkRole" class="share-role-select">
        <option value="view">Viewer</option>
        <option value="edit">Editor</option>
      </select>
    </div>
    <div class="share-footer">
      <button id="copyLinkBtn">🔗 Copy link</button>
      <button id="shareDoneBtn">Done</button>
    </div>
    <div id="copyToast"></div>
  </div>
</div>

<script>
const lockedEl = document.getElementById("locked");
const appEl = document.getElementById("app");
const answerEl = document.getElementById("answer");
const statusEl = document.getElementById("status");
const updatedAt = document.getElementById("updatedAt");
const autoCopyBtn = document.getElementById("autoCopyBtn");
const roleBadge = document.getElementById("roleBadge");
const shareBtn = document.getElementById("shareBtn");
const shareOverlay = document.getElementById("shareOverlay");
const linkRole = document.getElementById("linkRole");
const accessDesc = document.getElementById("accessDesc");
const copyToast = document.getElementById("copyToast");
const remoteSelBar = document.getElementById("remoteSelBar");

let autoCopy = localStorage.getItem("lw-auto-copy") === "true";
let userRole = "edit";
let accessKey = "";
let shareLinks = { viewLink: "", editLink: "" };
let clientId = "";
let ws = null;
let applyingRemote = false;
let syncTimer = null;
let selTimer = null;
let lastEditSyncTs = 0;

function setAutoCopy(on) {
  autoCopy = on;
  localStorage.setItem("lw-auto-copy", on ? "true" : "false");
  autoCopyBtn.textContent = `Auto Copy: ${on ? "ON" : "OFF"}`;
  autoCopyBtn.classList.toggle("on", on);
}

function getOffsetInContainer(root, node, offset) {
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
  let pos = 0;
  while (walker.nextNode()) {
    const current = walker.currentNode;
    if (current === node) return pos + offset;
    pos += current.textContent.length;
  }
  return pos;
}

function applyRemoteText(text) {
  if (answerEl.innerText === text) return;

  const wasFocused = document.activeElement === answerEl;
  const cursor = wasFocused ? getOffsetInContainer(
    answerEl,
    window.getSelection().anchorNode,
    window.getSelection().anchorOffset
  ) : null;

  applyingRemote = true;
  answerEl.innerText = text;
  applyingRemote = false;
  updatedAt.textContent = new Date().toLocaleTimeString();
  clearRemoteSelection();

  if (wasFocused && cursor !== null) {
    const pos = Math.min(cursor, text.length);
    const range = getRangeFromOffsets(pos, pos);
    if (range) {
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }
  }
}

function applyIncomingStream(text, ts) {
  if (ts && ts <= lastEditSyncTs) return;
  if (Date.now() - lastEditSyncTs < 15000) return;
  if (!autoCopy && userRole === "edit") return;
  if (userRole === "edit" && document.activeElement === answerEl) return;
  applyRemoteText(text);
}

function sendSync() {
  if (userRole !== "edit") return;

  const text = answerEl.innerText;
  lastEditSyncTs = Date.now();

  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: "sync", text, ts: lastEditSyncTs }));
  }

  fetch("/api/sync", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text, role: userRole, key: accessKey })
  }).catch(() => {});
}

function scheduleSync() {
  clearTimeout(syncTimer);
  syncTimer = setTimeout(sendSync, 150);
}

function getSelectionOffsets() {
  const sel = window.getSelection();
  if (!sel || !sel.rangeCount) return null;

  const range = sel.getRangeAt(0);
  if (!answerEl.contains(range.commonAncestorContainer)) return null;

  const start = getOffsetInContainer(answerEl, range.startContainer, range.startOffset);
  const end = start + range.toString().length;

  return { start, end, text: range.toString() };
}

function getRangeFromOffsets(start, end) {
  const range = document.createRange();
  const walker = document.createTreeWalker(answerEl, NodeFilter.SHOW_TEXT);
  let pos = 0;
  let startNode = null;
  let startOff = 0;
  let endNode = null;
  let endOff = 0;

  while (walker.nextNode()) {
    const node = walker.currentNode;
    const len = node.textContent.length;
    if (!startNode && pos + len >= start) {
      startNode = node;
      startOff = start - pos;
    }
    if (pos + len >= end) {
      endNode = node;
      endOff = end - pos;
      break;
    }
    pos += len;
  }

  if (!startNode || !endNode) return null;
  range.setStart(startNode, startOff);
  range.setEnd(endNode, endOff);
  return range;
}

function clearRemoteSelection() {
  if (CSS.highlights) CSS.highlights.delete("remote-selection");
  remoteSelBar.classList.remove("visible");
  remoteSelBar.textContent = "";
}

function showRemoteSelection(msg) {
  if (msg.clientId === clientId) return;

  clearRemoteSelection();

  if (msg.start === msg.end) return;

  const range = getRangeFromOffsets(msg.start, msg.end);
  if (range && CSS.highlights) {
    CSS.highlights.set("remote-selection", new Highlight(range));
  }

  const preview = (msg.text || "").trim();
  if (preview) {
    const short = preview.length > 80 ? `${preview.slice(0, 80)}…` : preview;
    remoteSelBar.textContent = `Partner selected: "${short}"`;
    remoteSelBar.classList.add("visible");
  }
}

function sendSelection() {
  if (!ws || ws.readyState !== WebSocket.OPEN || userRole !== "edit") return;

  const sel = getSelectionOffsets();
  if (!sel) {
    ws.send(JSON.stringify({ type: "selection", start: 0, end: 0, text: "" }));
    return;
  }

  ws.send(JSON.stringify({
    type: "selection",
    start: sel.start,
    end: sel.end,
    text: sel.text
  }));
}

function scheduleSelection() {
  clearTimeout(selTimer);
  selTimer = setTimeout(sendSelection, 100);
}

function applyRole(role) {
  userRole = role;
  roleBadge.textContent = role === "edit" ? "Editor" : "Viewer";
  shareBtn.classList.toggle("hidden", role !== "edit");

  if (role === "view") {
    answerEl.contentEditable = "false";
    answerEl.classList.add("view-only");
    autoCopyBtn.classList.add("hidden");
    autoCopy = true;
  } else {
    answerEl.contentEditable = "true";
    answerEl.classList.remove("view-only");
    autoCopyBtn.classList.remove("hidden");
    setAutoCopy(autoCopy);
  }
}

function showApp() {
  lockedEl.classList.add("hidden");
  appEl.classList.remove("hidden");
  connect();
}

async function tryAuth(role, key) {
  const res = await fetch(`/auth?role=${encodeURIComponent(role)}&key=${encodeURIComponent(key)}`);
  const data = await res.json();
  return data.ok ? data : null;
}

async function initAccess() {
  const params = new URLSearchParams(location.search);
  const role = params.get("role") || sessionStorage.getItem("lw-role");
  const key = params.get("key") || sessionStorage.getItem("lw-key");

  const probe = await fetch("/auth?role=edit&key=");
  const { secured } = await probe.json();

  if (!secured) {
    applyRole("edit");
    showApp();
    return;
  }

  if (role && key) {
    const auth = await tryAuth(role, key);
    if (auth) {
      accessKey = key;
      sessionStorage.setItem("lw-role", role);
      sessionStorage.setItem("lw-key", key);
      applyRole(auth.role);
      showApp();
      return;
    }
  }

  lockedEl.classList.remove("hidden");
}

function updateAccessDesc() {
  const role = linkRole.value;
  accessDesc.textContent =
    role === "edit"
      ? "Anyone on the internet with the link can edit"
      : "Anyone on the internet with the link can view";
}

function getSelectedLink() {
  return linkRole.value === "edit" ? shareLinks.editLink : shareLinks.viewLink;
}

async function openShareModal() {
  copyToast.textContent = "";
  const res = await fetch(
    `/api/share-links?role=${encodeURIComponent(userRole)}&key=${encodeURIComponent(accessKey)}`
  );
  if (res.ok) {
    shareLinks = await res.json();
  } else {
    shareLinks = {
      viewLink: `${location.origin}/?role=view&key=${accessKey}`,
      editLink: `${location.origin}/?role=edit&key=${accessKey}`
    };
  }
  linkRole.value = "view";
  updateAccessDesc();
  shareOverlay.classList.remove("hidden");
}

shareBtn.addEventListener("click", openShareModal);
linkRole.addEventListener("change", updateAccessDesc);

document.getElementById("copyLinkBtn").addEventListener("click", async () => {
  const link = getSelectedLink();
  await navigator.clipboard.writeText(link);
  copyToast.textContent = "Link copied to clipboard";
});

document.getElementById("sendEmailBtn").addEventListener("click", async () => {
  const email = document.getElementById("shareEmail").value.trim();
  const btn = document.getElementById("sendEmailBtn");

  if (!email) {
    copyToast.textContent = "Enter an email address";
    return;
  }

  btn.disabled = true;
  copyToast.textContent = "Sending...";

  try {
    const res = await fetch("/api/send-invite", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email,
        linkRole: linkRole.value,
        role: userRole,
        key: accessKey
      })
    });

    const data = await res.json();

    if (res.ok) {
      copyToast.textContent = `Invite sent to ${email}`;
      document.getElementById("shareEmail").value = "";
    } else if (data.mailto) {
      window.location.href = data.mailto;
      copyToast.textContent = "Opening your email app...";
    } else {
      copyToast.textContent = data.error || "Could not send email";
    }
  } catch {
    copyToast.textContent = "Could not send email";
  }

  btn.disabled = false;
});

document.getElementById("shareDoneBtn").addEventListener("click", () => {
  shareOverlay.classList.add("hidden");
});

shareOverlay.addEventListener("click", (e) => {
  if (e.target === shareOverlay) shareOverlay.classList.add("hidden");
});

autoCopyBtn.addEventListener("click", () => setAutoCopy(!autoCopy));

answerEl.addEventListener("input", () => {
  if (applyingRemote || userRole !== "edit") return;
  scheduleSync();
});

answerEl.addEventListener("beforeinput", () => {
  if (applyingRemote || userRole !== "edit") return;
  scheduleSync();
});

answerEl.addEventListener("keyup", () => {
  if (applyingRemote || userRole !== "edit") return;
  scheduleSync();
});

answerEl.addEventListener("paste", () => {
  if (applyingRemote || userRole !== "edit") return;
  scheduleSync();
});

answerEl.addEventListener("cut", () => {
  if (applyingRemote || userRole !== "edit") return;
  scheduleSync();
});

document.addEventListener("selectionchange", () => {
  if (userRole !== "edit") return;
  scheduleSelection();
});

function connect() {
  const wsProtocol = location.protocol === "https:" ? "wss:" : "ws:";
  const qs = `role=${encodeURIComponent(userRole)}&key=${encodeURIComponent(accessKey)}`;
  ws = new WebSocket(`${wsProtocol}//${location.host}?${qs}`);

  ws.onopen = () => {
    statusEl.textContent = "Connected";
    statusEl.className = "status connected";
  };

  ws.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);

      if (msg.type === "auth") {
        clientId = msg.clientId || "";
        applyRole(msg.role);
      }

      if (msg.type === "sync" && typeof msg.text === "string") {
        if (msg.clientId === clientId) return;

        if (msg.from === "edit" || msg.from === "server") {
          lastEditSyncTs = msg.ts || Date.now();
          applyRemoteText(msg.text);
        } else if (msg.from === "stream") {
          applyIncomingStream(msg.text, msg.ts);
        } else {
          lastEditSyncTs = msg.ts || Date.now();
          applyRemoteText(msg.text);
        }
      }

      if (msg.type === "selection") {
        showRemoteSelection(msg);
      }
    } catch {}
  };

  ws.onclose = (event) => {
    if (event.code === 1008) {
      sessionStorage.clear();
      appEl.classList.add("hidden");
      lockedEl.classList.remove("hidden");
      statusEl.textContent = "Disconnected";
      return;
    }
    statusEl.textContent = "Disconnected";
    statusEl.className = "status disconnected";
    setTimeout(connect, 2000);
  };
}

initAccess();
</script>
</body>
</html>
