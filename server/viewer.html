<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Workspace</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#000;
  color:#f8fafc;
  font-family:system-ui,sans-serif;
  min-height:100vh;
}

.container{
  max-width:900px;
  margin:0 auto;
  padding:12px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:10px;
}

.logo{
  font-size:16px;
  font-weight:700;
  letter-spacing:.2px;
}

.status{
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:600;
  position:fixed;
  top:10px;
  right:10px;
  z-index:10;
}

.connected{
  background:#052e16;
  color:#4ade80;
}

.disconnected{
  background:#3a1a1a;
  color:#f87171;
}

.workspace{
  background:transparent;
  border:1px solid #111;
  border-radius:12px;
  min-height:0;
  padding:18px;
  box-shadow:none;
}

#answer{
  white-space:pre-wrap;
  line-height:1.75;
  font-size:15px;
  color:#eaeaea;
  max-width:780px;
}

.footer{
  margin-top:16px;
  font-size:12px;
  color:#888;
}

.fade{
  animation:fadeIn .12s ease;
}

@keyframes fadeIn{
  from{opacity:.75;}
  to{opacity:1;}
}

@media (max-width: 768px){

  .container{
    padding:14px;
  }

  .header{
    gap:12px;
    flex-direction:column;
    align-items:flex-start;
  }

  .logo{
    font-size:16px;
  }

  .workspace{
    padding:14px;
    min-height:calc(100vh - 180px);
  }

  #answer{
    font-size:14px;
    line-height:1.7;
  }

}
</style>
</head>

<body>

<div class="container">

  <div class="header">
      <div class="logo">
          Live Workspace
      </div>

      <div id="status" class="status disconnected">
          Connecting...
      </div>
  </div>

  <div class="workspace">

      <div id="answer">
Waiting for content...
      </div>

  </div>

  <div class="footer">
      Last Updated:
      <span id="updatedAt">--</span>
  </div>

</div>

<script>

const answerEl = document.getElementById("answer");
const statusEl = document.getElementById("status");
const updatedAt = document.getElementById("updatedAt");

const wsUrl =
  location.protocol === "https:"
    ? `wss://${location.host}`
    : `ws://${location.host}`;

function connect(){

  const ws = new WebSocket(wsUrl);

  ws.onopen = () => {

    statusEl.textContent = "Connected";
    statusEl.className =
      "status connected";

  };

  ws.onmessage = (event) => {

    try{

      const msg =
        JSON.parse(event.data);

      if(
        msg.type === "answer"
        && msg.text
      ){

        answerEl.textContent =
          msg.text;

        answerEl.classList.remove("fade");
        void answerEl.offsetWidth;
        answerEl.classList.add("fade");

        updatedAt.textContent =
          new Date()
          .toLocaleTimeString();

      }

    }catch(e){}

  };

  ws.onclose = () => {

    statusEl.textContent =
      "Disconnected";

    statusEl.className =
      "status disconnected";

    setTimeout(connect,2000);

  };

}

connect();

</script>

</body>
</html>
